name: Weekly Pipeline

on:
  schedule:
    - cron: '0 10 * * 1'   # Todos los lunes a las 10:00 UTC
  workflow_dispatch:         # Permite ejecución manual desde la UI de GitHub

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python pipeline.py

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions.csv oraculo-sp500/index.html metrics.json model.joblib
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: weekly pipeline run $(date -u +%Y-%m-%d)"
          git push || (git pull --rebase && git push)
